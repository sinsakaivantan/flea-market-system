# データベース接続設定（環境変数から取得可能）
# 環境変数: DB_URL, DB_USERNAME, DB_PASSWORD
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/fleamarketdb}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
# データベース接続プール設定（接続エラー対策）
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ファイルアップロードサイズ制限設定
# 1つのファイルの最大サイズ（10MB）
spring.servlet.multipart.max-file-size=10MB
# リクエスト全体の最大サイズ（10MB）
spring.servlet.multipart.max-request-size=10MB

# ログレベル設定（環境変数から取得可能）
# 環境変数: LOGGING_LEVEL (DEBUG, INFO, WARN, ERROR)
# デフォルト値はINFO（起動エラーの詳細を確認する場合はDEBUGに変更）
logging.level.root=${LOGGING_LEVEL:INFO}
logging.level.org.springframework.security=${LOGGING_LEVEL:INFO}
logging.level.com.example.fleamarketsystem=${LOGGING_LEVEL:INFO}
logging.level.com.example.fleamarketsystem.security=${LOGGING_LEVEL:DEBUG}

# SQL scripts for schema and data initialization
# never: SQLスクリプトを実行しない（データを保持）
# always: 毎回実行（開発時のみ使用）
spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:/schema.sql
spring.sql.init.data-locations=classpath:/data.sql

# --- Cloudinary ---
# 環境変数: CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dummy_cloud_name}
cloudinary.api-key=${CLOUDINARY_API_KEY:dummy_api_key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:dummy_api_secret}

# --- Stripe ---
# 環境変数: STRIPE_SECRET_KEY, STRIPE_PUBLIC_KEY
stripe.api.secretKey=${STRIPE_SECRET_KEY:sk_test_dummy_key}
stripe.public.key=${STRIPE_PUBLIC_KEY:pk_test_dummy_key}

# --- LINE Notify ---
# 環境変数: LINE_NOTIFY_ENDPOINT, LINE_NOTIFY_TOKEN
line.notify.api.url=${LINE_NOTIFY_ENDPOINT:https://notify-api.line.me/api/notify}
line.notify.token=${LINE_NOTIFY_TOKEN:dummy_token}

# サーバーポート設定（環境変数から取得可能）
# 環境変数: SERVER_PORT
server.port=${SERVER_PORT:8080}

# Springプロファイル設定（環境変数から取得可能）
# 環境変数: SPRING_PROFILES_ACTIVE
spring.profiles.active=${SPRING_PROFILES_ACTIVE:}