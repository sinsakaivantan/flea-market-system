# データベース接続設定（環境変数から取得可能）
# 環境変数: DB_URL, DB_USERNAME, DB_PASSWORD
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/fleamarketdb}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
# データベース接続プール設定（接続エラー対策）
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ファイルアップロードサイズ制限設定
# 1つのファイルの最大サイズ（10MB）
spring.servlet.multipart.max-file-size=10MB
# リクエスト全体の最大サイズ（10MB）
spring.servlet.multipart.max-request-size=10MB

# ログレベル設定（環境変数から取得可能）
# 環境変数: LOGGING_LEVEL (DEBUG, INFO, WARN, ERROR)
# デフォルト値はINFO（起動エラーの詳細を確認する場合はDEBUGに変更）
logging.level.root=${LOGGING_LEVEL:INFO}
logging.level.org.springframework.security=${LOGGING_LEVEL:INFO}
logging.level.com.example.fleamarketsystem=${LOGGING_LEVEL:INFO}
logging.level.com.example.fleamarketsystem.security=${LOGGING_LEVEL:DEBUG}

# SQL scripts for schema and data initialization
# never: SQLスクリプトを実行しない（データを保持）【推奨設定】
# always: 毎回実行（開発時のみ使用）【注意: 全データが削除されます】
# embedded: 組み込みDBの場合のみ実行
spring.sql.init.mode=never
# 注意: spring.sql.init.mode=neverの場合、以下の設定は無視されますが、
# 念のため明示的に設定しています
spring.sql.init.schema-locations=classpath:/schema.sql
spring.sql.init.data-locations=classpath:/data.sql
# データベースの自動初期化を完全に無効化（追加の安全策）
spring.jpa.defer-datasource-initialization=false

# --- Cloudinary ---
# 環境変数: CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dummy_cloud_name}
cloudinary.api-key=${CLOUDINARY_API_KEY:dummy_api_key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:dummy_api_secret}

# --- Stripe ---
# 環境変数: STRIPE_SECRET_KEY, STRIPE_PUBLIC_KEY
stripe.api.secretKey=${STRIPE_SECRET_KEY:sk_test_dummy_key}
stripe.public.key=${STRIPE_PUBLIC_KEY:pk_test_dummy_key}

# --- Gmail SMTP ---
# 環境変数: GMAIL_SMTP_USERNAME, GMAIL_SMTP_PASSWORD
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_SMTP_USERNAME:}
spring.mail.password=${GMAIL_SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# サーバーポート設定（環境変数から取得可能）
# 環境変数: SERVER_PORT
server.port=${SERVER_PORT:8080}

# Springプロファイル設定（環境変数から取得可能）
# 環境変数: SPRING_PROFILES_ACTIVE
spring.profiles.active=${SPRING_PROFILES_ACTIVE:}