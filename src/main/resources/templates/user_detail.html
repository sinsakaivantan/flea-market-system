<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${user.name + ' - フリマアプリ'}">ユーザー詳細 - フリマアプリ</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header th:insert="~{fragments/layout :: header}"></header>
    <div class="container mypage-container">
        <div th:if="${errorMessage}" class="error-message" th:text="${errorMessage}"></div>
        <div th:if="${successMessage}" class="success-message" th:text="${successMessage}"></div>

        <div class="mypage-profile-section">
            <div class="mypage-avatar">
                <img th:src="${user.profileImageUrl != null ? user.profileImageUrl : '/images/default-user.png'}"
                     alt="プロフィール画像"
                     class="profile-image">
            </div>
            <div class="mypage-info">
                <div class="mypage-name-row">
                    <div class="mypage-username" th:text="${user.name}"></div>
                    <div class="user-detail-follow-button-container" sec:authorize="isAuthenticated()" th:if="${isOwnPage == null or !isOwnPage}">
                        <form th:if="${isFollowing != null and isFollowing}" 
                              th:action="@{/follow/{userId}/unfollow(userId=${user.id}, returnTo='user')}" 
                              method="post" style="display:inline;">
                            <button type="submit" class="follow-button following">フォロー中</button>
                        </form>
                        <form th:if="${isFollowing == null or !isFollowing}" 
                              th:action="@{/follow/{userId}(userId=${user.id}, returnTo='user')}" 
                              method="post" style="display:inline;">
                            <button type="submit" class="follow-button">&nbsp; フォロー &nbsp;</button>
                        </form>
                    </div>
                </div>
                <div class="mypage-rating-row">
                    <div class="mypage-stars" th:if="${reviewCount > 0}">
                        <span th:each="starClass : ${starClasses}"
                              class="star-icon"
                              th:classappend=" ' ' + ${starClass}">
                            ★
                        </span>
                        <span class="mypage-rating-score" th:text="${averageRatingFormatted}"></span>
                        <span class="mypage-rating-count" th:text="${reviewCount}"></span>
                    </div>
                    <div class="mypage-rating-row" th:if="${reviewCount == 0}">
                        <span class="mypage-rating-count">まだ評価がありません</span>
                    </div>
                </div>
                <div class="mypage-stats-row">
                    <div class="mypage-stat-item">
                        <div class="mypage-stat-label">出品数</div>
                        <div class="mypage-stat-value" th:text="${itemCount}"></div>
                    </div>
                    <a th:href="@{/users/{id}/followlist(id=${user.id})}" class="mypage-stat-item mypage-stat-link">
                        <div class="mypage-stat-label">フォロー数</div>
                        <div class="mypage-stat-value" th:text="${followingCount}"></div>
                    </a>
                    <a th:href="@{/users/{id}/followers(id=${user.id})}" class="mypage-stat-item mypage-stat-link">
                        <div class="mypage-stat-label">フォロワー数</div>
                        <div class="mypage-stat-value" th:text="${followerCount}"></div>
                    </a>
                </div>
            </div>
        </div>

        <h2 class="mypage-section-title">出品した商品</h2>
        <div class="item-grid">
            <div class="item-card" th:each="item : ${activeItems}">
                <a th:href="@{/items/{id}(id=${item.id})}">
                    <img th:src="${item.firstImageUrl != null ? item.firstImageUrl : '/images/noimage.png'}" alt="商品画像">
                    <h3 th:text="${item.name}"></h3>
                    <p class="price" th:text="'¥' + ${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')}"></p>
                    <p class="status" th:text="${item.status}"></p>
                </a>
            </div>
            <div th:if="${#lists.isEmpty(activeItems)}">
                <p>出品中の商品はありません。</p>
            </div>
        </div>
    </div>
</body>
</html>
