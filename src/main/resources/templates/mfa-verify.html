<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celestial Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a0b2e;       /* 深い紫（夜空） */
            --gold: #d4af37;           /* アンティークゴールド */
            --gold-glow: #f9e79f;      /* 光るゴールド */
            --text-color: #e0d8ff;     /* 薄いラベンダー */
            --glass-panel: rgba(20, 10, 40, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #2e1a47 0%, #0d0417 100%);
            color: var(--text-color);
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
            position: relative;
        }

        /* --- 背景のアニメーション装飾 --- */
        
        /* 1. 星空キャンバス */
        #constellation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* 2. 背景でゆっくり回るゾディアックリング（魔法陣風） */
        .zodiac-ring {
            position: absolute;
            width: 700px;
            height: 700px;
            border: 1px dashed rgba(212, 175, 55, 0.2); /* 薄いゴールドの破線 */
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: rotateRight 120s linear infinite;
        }
        
        .zodiac-ring::before {
            content: '';
            position: absolute;
            width: 85%;
            height: 85%;
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 50%;
            border-top: 1px solid rgba(212, 175, 55, 0.6); /* 一部だけ濃くして立体感 */
        }
        
        .zodiac-inner {
            position: absolute;
            width: 400px;
            height: 400px;
            border: 2px solid rgba(212, 175, 55, 0.1);
            border-radius: 50%;
            transform: rotate(45deg);
            border-left: 2px solid rgba(212, 175, 55, 0.4);
            border-right: 2px solid rgba(212, 175, 55, 0.4);
            animation: rotateLeft 80s linear infinite;
        }

        @keyframes rotateRight {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes rotateLeft {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        /* --- メインフォーム --- */
        .card-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 3rem 2rem;
            background: var(--glass-panel);
            /* ゴールドの二重線枠 */
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 
                0 0 0 4px rgba(212, 175, 55, 0.05), /* 外側の薄い枠 */
                0 0 40px rgba(0, 0, 0, 0.8);
            text-align: center;
            backdrop-filter: blur(5px);
        }

        /* 枠の四隅に装飾をつける（タロットカード風） */
        .card-container::after {
            content: '';
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 1px solid rgba(212, 175, 55, 0.5);
            pointer-events: none;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        }
        
        .subtitle {
            font-size: 0.9rem;
            color: rgba(224, 216, 255, 0.6);
            margin-bottom: 2.5rem;
            font-style: italic;
        }

        /* エラーメッセージ */
        .error-message {
            color: #ff8e8e;
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 142, 142, 0.3);
            display: inline-block;
            padding-bottom: 3px;
        }

        /* 入力エリア */
        .input-wrapper {
            position: relative;
            margin-bottom: 2.5rem;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
        }

        input[type="text"] {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(212, 175, 55, 0.5);
            padding: 10px;
            color: var(--gold-glow);
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            text-align: center;
            letter-spacing: 0.3em;
            transition: all 0.4s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-bottom: 1px solid var(--gold);
            box-shadow: 0 10px 20px -10px rgba(212, 175, 55, 0.2);
            text-shadow: 0 0 8px var(--gold);
        }

        input::placeholder {
            color: rgba(212, 175, 55, 0.3);
            font-size: 0.8rem;
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: 0.1em;
        }

        /* ボタン */
        .button {
            background: transparent;
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            padding: 0.8rem 3rem;
            border: 1px solid var(--gold);
            cursor: pointer;
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.15em;
        }

        .button:hover {
            background: rgba(212, 175, 55, 0.1);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            text-shadow: 0 0 5px var(--gold);
        }
        
        /* ボタンの装飾線 */
        .button::before, .button::after {
            content: '✦';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.8rem;
            opacity: 0.5;
            transition: all 0.3s;
        }
        .button::before { left: 10px; }
        .button::after { right: 10px; }
        
        .button:hover::before { left: 5px; opacity: 1; }
        .button:hover::after { right: 5px; opacity: 1; }

    </style>
</head>
<body>

    <canvas id="constellation"></canvas>

    <div class="zodiac-ring">
        <div class="zodiac-inner"></div>
    </div>

    <div class="card-container">
        <h1>2段階認証</h1>
        <p class="subtitle">security tokenを発行してください</p>

        <form th:action="@{/mfa/verify}" method="post">
            
            <p th:if="${error}" th:text="${error}" class="error-message"></p>
            
            <div class="input-wrapper">
                <input type="text" name="de" placeholder="Enter the Code" maxlength="6" required autocomplete="off">
            </div>
            
            <button type="submit" class="button">UNLOCK</button>
        </form>
    </div>

    <script>
        /**
         * 占星術風の「瞬く星」を描画するスクリプト
         */
        const canvas = document.getElementById('constellation');
        const ctx = canvas.getContext('2d');
        let width, height;
        let stars = [];

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        class Star {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2; // 星は小さめに
                this.maxSize = this.size + Math.random() * 2; // 瞬いたときの最大サイズ
                this.alpha = Math.random(); 
                this.direction = Math.random() > 0.5 ? 0.01 : -0.01; // 明滅の速度
                this.color = Math.random() > 0.8 ? '#d4af37' : '#ffffff'; // たまにゴールドの星
            }

            update() {
                // ゆっくり明滅させる
                this.alpha += this.direction;
                if (this.alpha >= 1 || this.alpha <= 0.2) {
                    this.direction *= -1;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                
                // 十字の輝き（クロス）を描画して、より星っぽくする
                if (this.alpha > 0.6) {
                    ctx.globalAlpha = this.alpha * 0.3;
                    const glowSize = this.size * 6;
                    ctx.fillStyle = this.color;
                    ctx.fillRect(this.x - glowSize/2, this.y, glowSize, 0.5); // 横線
                    ctx.fillRect(this.x, this.y - glowSize/2, 0.5, glowSize); // 縦線
                }

                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        function init() {
            resize();
            // 星の数
            for(let i=0; i<150; i++) {
                stars.push(new Star());
            }
            loop();
        }

        function loop() {
            // 前のフレームをクリア
            ctx.clearRect(0, 0, width, height);

            stars.forEach(star => {
                star.update();
                star.draw();
            });

            // ランダムに流れ星
            if (Math.random() < 0.005) {
                drawShootingStar();
            }

            requestAnimationFrame(loop);
        }
        
        // 簡易的な流れ星エフェクト
        let shootingStars = [];
        function drawShootingStar() {
            // 本格実装は複雑になるため、ここでは雰囲気としての「稀な光」
            // 実際はCanvas上にラインを一瞬描画する処理などが理想
        }

        window.addEventListener('resize', resize);
        init();
    </script>
</body>
</html>
