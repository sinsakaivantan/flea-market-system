<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${item.name} + ' - 商品詳細'"></title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
	<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
	<style> 
		        .overlay {
		            display: none; /* 最初は非表示 */
		            position: fixed;
		            top: 0;
		            left: 0;
		            width: 100%;
		            height: 100%;
		            background-color: rgba(0, 0, 0, 0.5); /* 半透明の黒背景 */
		            justify-content: center;
		            align-items: center;
		            z-index: 1000;
		        }

		        /* フォーム本体 */
		        .form-container {
		            position: relative;
		            background: white;
		            padding: 30px;
		            border-radius: 10px;
		            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
		            width: 400px;
		            max-width: 90%;
		        }

		        /* 閉じるボタン（左上） */
		        .close-btn {
		            position: absolute;
		            top: 10px;
		            left: 10px;
		            background: none;
		            border: none;
		            font-size: 28px;
		            cursor: pointer;
		            color: #aaa;
		            width: 30px;
		            height: 30px;
		            display: flex;
		            align-items: center;
		            justify-content: center;
		        }

		        .close-btn:hover {
		            color: #000;
		        }

		        /* 開くボタン */
		        .open-btn {
		            padding: 10px 20px;
		            font-size: 16px;
		            background-color: #007bff;
		            color: white;
		            border: none;
		            border-radius: 5px;
		            cursor: pointer;
		        }

		        .open-btn:hover {
		            background-color: #0056b3;
		        }
		    </style>
</head>
<body>
	<header th:insert="~{fragments/layout :: header}"></header>
		<div class="overlay" id="overlay">
		        <div class="form-container">
		            <button class="close-btn" id="closeForm">❌</button>
					<p><span th:text="${item.seller.name}"></span>を通報</p>
		<form th:action="@{|/report/${item.seller.id}|}" method="post">
			<label for="description">理由:</label>
			<textarea id="description" name="description" rows="5"></textarea>
			<button type="submit" class="button">通報</button>
		</form>
		</div>
		</div>
    <div class="container">
        <h1 th:text="${item.name}"></h1>

        <div th:if="${errorMessage}" class="error-message" th:text="${errorMessage}"></div>
        <div th:if="${successMessage}" class="success-message" th:text="${successMessage}"></div>

        <div class="item-detail">
            <img th:src="${item.imageUrl != null ? item.imageUrl : '/images/noimage.png'}" alt="商品画像" class="item-image">
            <p class="price">価格: <span th:text="'¥' + ${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')}"></span></p>
            <p>説明: <span th:text="${item.description}"></span></p>
            <p>カテゴリ: <span th:text="${item.category != null ? item.category.name : '未分類'}"></span></p>
            <div style="display: flex; align-items: center; gap: 10px; margin: 10px 0;">
                <a th:href="@{/users/{id}(id=${item.seller.id})}" style="display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit;">
                    <img th:src="${item.seller.profileImageUrl != null ? item.seller.profileImageUrl : '/images/default-user.png'}" 
                         alt="出品者画像" 
                         class="profile-image-small">
                    <div>
                        <p style="margin: 0;">出品者: <span th:text="${item.seller.name}"></span>
                            <span th:if="${sellerAverageRating}">(平均評価: <span th:text="${sellerAverageRating}"></span>)</span>
                        </p>
                    </div>
                </a>
            </div>
            <div sec:authorize="isAuthenticated()" th:if="${isFollowing != null}" style="margin: 10px 0;">
                <form th:if="${isFollowing}" 
                      th:action="@{/follow/{userId}/unfollow(userId=${item.seller.id}, itemId=${item.id})}" 
                      method="post" style="display:inline;">
                    <button type="submit" class="button danger">フォロー解除</button>
                </form>
                <form th:unless="${isFollowing}" 
                      th:action="@{/follow/{userId}(userId=${item.seller.id}, itemId=${item.id})}" 
                      method="post" style="display:inline;">
                    <button type="submit" class="button">フォロー</button>
                </form>
            </div>
            <p>ステータス: <span th:text="${item.status}"></span></p>

            <div class="button-group">
                <form th:action="@{/orders/initiate-purchase}" method="post" th:if="${item.status == '出品中' and item.seller.email != #authentication.name}" onsubmit="return confirm('本当にこの商品を購入しますか？');">
                    <input type="hidden" name="itemId" th:value="${item.id}">
                    <button type="submit" class="button">購入する</button>
                </form>
                <a th:href="@{/chat/{itemId}(itemId=${item.id})}" class="button secondary">チャットで質問/交渉</a>

                <div sec:authorize="isAuthenticated()" th:if="${item.seller.email != #authentication.name}">
                    <form th:if="${isFavorited}" th:action="@{/items/{id}/unfavorite(id=${item.id})}" method="post" style="display:inline;">
                        <button type="submit" class="button danger">お気に入り解除</button>
                    </form>
                    <form th:unless="${isFavorited}" th:action="@{/items/{id}/favorite(id=${item.id})}" method="post" style="display:inline;">
                        <button type="submit" class="button">お気に入りに追加</button>
                    </form>
                </div>
                <div sec:authorize="isAuthenticated()" th:if="${item.seller.email != #authentication.name}">
                    <button class="open-btn" id="openForm">通報</button>
                </div>
            </div>
        </div>

		<h2>チャット</h2>
		<div class="chat-box" id="chatBox">
		    <div th:each="chat : ${chats}" class="chat-message" 
		         th:classappend="${chat.sender.email == #authentication.name ? 'my-message' : 'other-message'}">
		        <span class="sender-name" th:text="${chat.sender.name}"></span>
		        <span class="message-time" th:text="${#temporals.format(chat.createdAt, 'yyyy/MM/dd HH:mm')}"></span>
		        <p th:text="${chat.message}"></p>
		    </div>
		    <div id="noMessage" th:if="${#lists.isEmpty(chats)}">
		        <p>まだチャットメッセージはありません。</p>
		    </div>
		</div>

		<form id="chatForm" class="chat-form">
		    <textarea id="messageInput" name="message" placeholder="メッセージを入力してください" required></textarea>
		    <button type="submit">送信</button>
		</form>
		<script th:inline="javascript">
		    /*<![CDATA[*/
		    const itemId = /*[[${item.id}]]*/ 0;
		    const currentUserEmail = /*[[${#authentication.name}]]*/ '';
		    
		    let stompClient = null;

		    function connect() {
		        const socket = new SockJS('/ws-chat'); // WebSocketConfigで設定したエンドポイント
		        stompClient = Stomp.over(socket);
		        stompClient.debug = null; // デバッグログを抑制したい場合

		        stompClient.connect({}, function (frame) {
		            console.log('Connected: ' + frame);
		            
		            // トピックを購読 (この商品IDのチャットルーム)
		            stompClient.subscribe('/topic/chat/' + itemId, function (messageOutput) {
		                showMessage(JSON.parse(messageOutput.body));
		            });
		        }, function(error) {
		            console.error('Connection lost', error);
		            // 再接続ロジックなどを入れると尚良い
		        });
		    }

		    function sendMessage(event) {
		        event.preventDefault(); // フォームのデフォルト送信をキャンセル
		        const messageInput = document.getElementById('messageInput');
		        const messageContent = messageInput.value.trim();

		        if (messageContent && stompClient) {
		            const chatMessage = {
		                itemId: itemId,
		                message: messageContent
		            };
		            // サーバーへ送信
		            stompClient.send("/app/chat/" + itemId + "/send", {}, JSON.stringify(chatMessage));
		            messageInput.value = ''; // 入力欄をクリア
		        }
		    }

		    function showMessage(message) {
		        const chatBox = document.getElementById('chatBox');
		        const noMessageDiv = document.getElementById('noMessage');
		        
		        if (noMessageDiv) {
		            noMessageDiv.style.display = 'none';
		        }

		        // メッセージ要素を作成
		        const messageDiv = document.createElement('div');
		        messageDiv.classList.add('chat-message');
		        
		        // 自分か相手かでクラスを切り替え
		        if (message.senderEmail === currentUserEmail) {
		            messageDiv.classList.add('my-message');
		        } else {
		            messageDiv.classList.add('other-message');
		        }

		        // 内部HTMLを構築
		        const senderSpan = document.createElement('span');
		        senderSpan.classList.add('sender-name');
		        senderSpan.textContent = message.senderName;

		        const timeSpan = document.createElement('span');
		        timeSpan.classList.add('message-time');
		        timeSpan.textContent = message.createdAt; // 必要に応じてフォーマット調整

		        const p = document.createElement('p');
		        p.textContent = message.message;

		        messageDiv.appendChild(senderSpan);
		        messageDiv.appendChild(timeSpan);
		        messageDiv.appendChild(p);

		        chatBox.appendChild(messageDiv);
		        
		        // 最新メッセージが見えるようにスクロール
		        chatBox.scrollTop = chatBox.scrollHeight;
		    }

		    // 初期化
		    document.addEventListener('DOMContentLoaded', function() {
		        connect();
		        document.getElementById('chatForm').addEventListener('submit', sendMessage);
		        
		        // 初期ロード時も一番下へスクロール
		        const chatBox = document.getElementById('chatBox');
		        chatBox.scrollTop = chatBox.scrollHeight;
		    });

		    /*]]>*/
		</script>
        <div class="button-group">
            <a th:href="@{/items}" class="button secondary">商品一覧に戻る</a>
        </div>
    </div>
	<script>
		        const openBtn = document.getElementById('openForm');
		        const overlay = document.getElementById('overlay');
		        const closeBtn = document.getElementById('closeForm');

		        // 開く
		        openBtn.onclick = function() {
		            overlay.style.display = 'flex';
		        };

		        // 閉じる（❌ボタン）
		        closeBtn.onclick = function() {
		            overlay.style.display = 'none';
		        };

		        // オーバーレイの背景クリックでも閉じる（任意で追加）
		        overlay.onclick = function(e) {
		            if (e.target === overlay) {
		                overlay.style.display = 'none';
		            }
		        };
		    </script>
</body>
</html>
