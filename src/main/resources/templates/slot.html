<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eye-Press Slot 777</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

<style>
    /* --- 提供されたスタイルそのまま --- */
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at center, #1a0b2e 0%, #000 100%);
        color: #fff;
        font-family: 'Cinzel', serif;
        overflow: hidden;
    }

    .slot-machine {
        background: rgba(0, 0, 0, 0.8);
        padding: 40px;
        border-radius: 20px;
        border: 4px solid #d4af37;
        box-shadow: 0 0 50px rgba(212, 175, 55, 0.3);
        text-align: center;
    }

    .title {
        color: #d4af37;
        font-size: 2rem;
        margin-bottom: 30px;
        letter-spacing: 0.2em;
    }

    .reel-container {
        display: flex;
        gap: 20px;
        justify-content: center;
        background: #111;
        padding: 20px;
        border-radius: 10px;
        border: 1px solid #555;
    }

    .reel {
        width: 100px;
        height: 140px;
        background: linear-gradient(to bottom, #222, #000, #222);
        border: 2px solid #666;
        border-radius: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 5rem;
        font-family: 'Arial', sans-serif;
        font-weight: bold;
        color: #ccc;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition: transform 0.1s;
        box-shadow: inset 0 0 20px #000;
        user-select: none; /* 連打時の選択防止 */
    }

    .reel:active {
        transform: scale(0.95);
    }

    .reel.stopped {
        border-color: #d4af37;
        background: #333;
        cursor: default;
    }

    .reel.seven-glow {
        color: #ff0000;
        text-shadow: 
            0 0 10px #ff0000,
            0 0 20px #ffaa00,
            0 0 40px #ffff00;
        background: #2a0000;
        animation: flash 0.1s infinite;
    }

    @keyframes flash {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
    }

    .controls {
        margin-top: 30px;
    }

    .btn {
        background: transparent;
        border: 1px solid #d4af37;
        color: #d4af37;
        padding: 10px 30px;
        font-family: 'Cinzel', serif;
        font-size: 1.2rem;
        cursor: pointer;
        transition: 0.3s;
    }
    .btn:hover {
        background: #d4af37;
        color: #000;
    }

    #winOverlay {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: blue;
        z-index: 9999;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        animation: bg-pika 0.2s infinite;
    }

    @keyframes bg-pika {
        0% { background: blue; }
        50% { background: red; }
        100% { background: yellow; }
    }

    .dasa-font {
        font-family: "MS Mincho", "MS PMincho", "Times New Roman", serif;
        font-size: 8vw;
        font-weight: 900;
        color: #ff00ff;
        transform: scale(1, 4);
        margin: 50px 0;
        white-space: nowrap;
        text-shadow: 
            5px 5px 0px #000,
            10px 10px 0px #fff,
            15px 15px 0px #00ff00;
    }

    .wordart {
        font-family: "Comic Sans MS", cursive, sans-serif;
        font-size: 3rem;
        color: cyan;
        transform: rotate(-15deg);
        text-decoration: underline wavy red;
        margin-top: 100px;
        border: 5px dotted white;
        padding: 10px;
        background: black;
    }

    .confetti {
        position: absolute;
        font-size: 2rem;
        animation: fall 2s linear infinite;
    }

    @keyframes fall {
        to { transform: translateY(100vh) rotate(720deg); }
    }
    
    /* トースト通知 */
    #toast {
        visibility: hidden;
        min-width: 250px;
        margin-left: -125px;
        background-color: #333;
        color: #fff;
        text-align: center;
        border-radius: 2px;
        padding: 16px;
        position: fixed;
        z-index: 10000;
        left: 50%;
        bottom: 30px;
        font-size: 17px;
    }

    #toast.show {
        visibility: visible;
        animation: fadein 0.5s, fadeout 0.5s 2.5s;
    }
    
    @keyframes fadein {
        from {bottom: 0; opacity: 0;}
        to {bottom: 30px; opacity: 1;}
    }

    @keyframes fadeout {
        from {bottom: 30px; opacity: 1;}
        to {bottom: 0; opacity: 0;}
    }

</style>
</head>
<body>

    <div class="slot-machine">
        <div class="title">DESTINY SLOT</div>
        
        <div class="reel-container">
            <div class="reel" id="reel0" onclick="stopReel(0)">1</div>
            <div class="reel" id="reel1" onclick="stopReel(1)">1</div>
            <div class="reel" id="reel2" onclick="stopReel(2)">1</div>
        </div>

        <div class="controls">
            <p>Click Panels to Stop!</p>
            <button class="btn" onclick="resetGame()">RETRY</button>
            <div style="margin-top:20px;">
                <a href="/my-page/quests" style="color:#d4af37; text-decoration:none;">クエスト一覧に戻る</a>
            </div>
        </div>
    </div>

    <div id="winOverlay">
        <div class="dasa-font">おめでとうございまし</div>
        
        <div class="wordart">BIG BONUS!!</div>
        <div style="font-size:2rem; color:white; font-weight:bold; margin-top:20px;">クエスト達成！</div>
        
        <button class="btn" style="background: white; color: black; border: 5px solid black; font-weight: bold; margin-top: 100px; transform: scale(2);" onclick="resetGame()">戻る</button>
    </div>
    
    <div id="toast"></div>

<script>
    // --- WebSocket接続処理 ---
    let stompClient = null;

    function connect() {
        const socket = new SockJS('/ws-quest');
        stompClient = Stomp.over(socket);
        // stompClient.debug = null; // デバッグログを消す場合はコメントアウト解除

        stompClient.connect({}, function (frame) {
            console.log('Connected: ' + frame);
            
            // サーバーからの返信を受け取る
            stompClient.subscribe('/user/queue/reply', function (message) {
                const response = JSON.parse(message.body);
                // 必要ならトースト表示など
                if(response.success) {
                    showToast("クエスト進捗が保存されました！");
                }
            });
        });
    }

    // 勝利時にサーバーへ通知
    function sendWinSignal() {
        if(stompClient && stompClient.connected) {
            console.log("Sending Win Signal...");
            // スロット勝利通知 ("/app/slot-win" へ送信)
            stompClient.send("/app/slot-win", {}, JSON.stringify({}));
        } else {
            console.error("WebSocket is not connected.");
        }
    }

    function showToast(message) {
        const x = document.getElementById("toast");
        x.innerText = message;
        x.className = "show";
        setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
    }

    // --- ゲームロジック ---
    const reelElements = [
        document.getElementById('reel0'),
        document.getElementById('reel1'),
        document.getElementById('reel2')
    ];
    
    let reels = [
        { value: 1, interval: null, stopped: false },
        { value: 1, interval: null, stopped: false },
        { value: 1, interval: null, stopped: false }
    ];

    const winOverlay = document.getElementById('winOverlay');

    function startGame() {
        winOverlay.style.display = 'none';
        
        reels.forEach((reel, index) => {
            reel.value = Math.floor(Math.random() * 9) + 1;
            reel.stopped = false;
            reelElements[index].classList.remove('stopped', 'seven-glow');
            
            if (reel.interval) clearInterval(reel.interval);

            // 目押し可能な速度
            const speed = 80; 

            reel.interval = setInterval(() => {
                reel.value++;
                if (reel.value > 9) reel.value = 1;
                updateVisual(index, reel.value);
            }, speed);
        });
    }

    function updateVisual(index, value) {
        const el = reelElements[index];
        el.innerText = value;
        if (value === 7) {
            el.classList.add('seven-glow');
        } else {
            el.classList.remove('seven-glow');
        }
    }

    window.stopReel = function(index) {
        const reel = reels[index];
        if (reel.stopped) return;

        clearInterval(reel.interval);
        reel.stopped = true;
        reelElements[index].classList.add('stopped');
        
        if (reel.value === 7) {
            reelElements[index].classList.add('seven-glow');
        } else {
            reelElements[index].classList.remove('seven-glow');
        }

        checkWin();
    };

    function checkWin() {
        if (reels.some(r => !r.stopped)) return;

        const isAllSeven = reels.every(r => r.value === 7);

        if (isAllSeven) {
            // ★サーバーへ勝利通知を送信
            sendWinSignal();

            setTimeout(() => {
                showWinScreen();
            }, 500);
        }
    }

    function showWinScreen() {
        winOverlay.style.display = 'flex';
        for(let i=0; i<50; i++) {
            createConfetti();
        }
    }

    function createConfetti() {
        const confetti = document.createElement('div');
        confetti.innerText = Math.random() > 0.5 ? '㊗' : '7';
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
        confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
        winOverlay.appendChild(confetti);
    }

    window.resetGame = function() {
        const confettis = document.querySelectorAll('.confetti');
        confettis.forEach(c => c.remove());
        startGame();
    };

    // 初期化
    connect(); // WebSocket接続開始
    startGame();

</script>
</body>
</html>
