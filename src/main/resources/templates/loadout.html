<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pilot Loadout</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #050510;
            color: #00ffcc;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* 固定配置の基準点としてrelativeを設定 */
            position: relative; 
        }

        .container {
            width: 900px;
            padding: 30px;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #333;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.1);
            position: relative;
            /* 戻るボタンと重ならないように少し余白を持たせる（画面が小さい場合用） */
            margin-bottom: 50px; 
        }

        h1 {
            text-align: center;
            letter-spacing: 4px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #00ffcc;
        }

        /* --- 装備スロットグリッド --- */
        .slots-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .slot-card {
            background: rgba(0, 255, 204, 0.05);
            border: 2px solid #333;
            height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .slot-card:hover {
            border-color: #00ffcc;
            background: rgba(0, 255, 204, 0.1);
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.2);
        }

        .slot-label {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 0.8rem;
            color: #888;
            font-weight: bold;
        }

        .equipped-name {
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            padding: 0 10px;
            color: #fff;
        }

        .empty-text {
            color: #555;
            font-style: italic;
        }

        /* --- ステータス表示エリア --- */
        .stats-area {
            border-top: 1px dashed #444;
            padding-top: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        .stat-row {
            display: flex; justify-content: space-between; margin-bottom: 8px;
        }
        .stat-label { color: #aaa; }
        .stat-value { color: #fff; font-weight: bold; }

        /* --- モーダル (アイテム選択画面) --- */
        .modal-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 999;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: #0a0a15;
            border: 2px solid #00ffcc;
            width: 500px;
            max-height: 80vh;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 0 0 50px rgba(0,255,204,0.3);
        }
        .modal-header {
            display: flex; justify-content: space-between; margin-bottom: 20px;
            border-bottom: 1px solid #333; padding-bottom: 10px;
        }
        .close-btn {
            background: none; border: none; color: #ff4444; font-size: 1.5rem; cursor: pointer;
        }

        .slot-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 5px rgba(0, 255, 204, 0.5));
        }

        .list-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border: 1px solid #333;
            margin-right: 15px;
            background: #000;
        }

        .select-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border: 1px solid #333;
            margin-bottom: 10px;
            transition: 0.2s;
        }
        .select-item:hover { border-color: #ffd700; background: rgba(255, 215, 0, 0.05); }
        .select-item-info h4 { margin: 0 0 5px 0; color: #ffd700; }
        .select-item-info p { margin: 0; font-size: 0.8rem; color: #aaa; }

        .btn-equip-modal {
            background: #00ffcc; color: #000; border: none; padding: 8px 15px;
            cursor: pointer; font-weight: bold; font-family: inherit;
        }
        .btn-equip-modal:hover { background: #00cca3; }
        .btn-unequip-modal {
            background: transparent; border: 1px solid #ff4444; color: #ff4444; padding: 8px 15px;
            cursor: pointer; font-weight: bold; font-family: inherit;
        }
        
        /* ★修正: 左下に固定表示するためのスタイル */
        .back-link { 
            position: fixed;   /* 画面に対して位置を固定 */
            bottom: 30px;      /* 下から30px */
            left: 30px;        /* 左から30px */
            color: #fff; 
            text-decoration: none; 
            font-size: 1.2rem;
            z-index: 100;      /* 他の要素より手前に */
            opacity: 0.8;
            transition: 0.3s;
        }
        .back-link:hover {
            opacity: 1;
            color: #00ffcc;
            text-shadow: 0 0 10px #00ffcc;
        }

        .actions { margin-top: 30px; text-align: center; display: flex; justify-content: center; gap: 20px;}
        .btn { padding: 15px 30px; text-decoration: none; color: #000; font-weight: bold; background: #00ffcc; display: inline-block; transition:0.3s;}
        .btn:hover { background: #00cca3; box-shadow: 0 0 15px #00ffcc; }
        .btn-sec { background: transparent; border: 1px solid #00ffcc; color: #00ffcc; }
        .btn-sec:hover { background: rgba(0,255,204,0.1); }
        
        .item-content-wrapper {
            display: flex;
            align-items: center;
            flex: 1;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>GEMINI GAME</h1>

        <div class="slots-container">
            
            <div class="slot-card" onclick="openModal('WEAPON')">
                <span class="slot-label">WEAPON</span>
                <div th:if="${equippedMap['WEAPON'] != null}" style="text-align:center; width:100%;">
                    <img th:src="${equippedMap['WEAPON'].item.imageUrl ?: '/images/no-image.png'}" class="slot-img">
                    <div class="equipped-name" th:text="${equippedMap['WEAPON'].item.name}">Name</div>
                </div>
                <div th:if="${equippedMap['WEAPON'] == null}" class="empty-text">EMPTY</div>
            </div>

            <div class="slot-card" onclick="openModal('AMULET')">
                <span class="slot-label">AMULET</span>
                <div th:if="${equippedMap['AMULET'] != null}" style="text-align:center; width:100%;">
                    <img th:src="${equippedMap['AMULET'].item.imageUrl ?: '/images/no-image.png'}" class="slot-img">
                    <div class="equipped-name" th:text="${equippedMap['AMULET'].item.name}">Name</div>
                </div>
                <div th:if="${equippedMap['AMULET'] == null}" class="empty-text">EMPTY</div>
            </div>

            <div class="slot-card" onclick="openModal('DOPING')">
                <span class="slot-label">DOPING</span>
                <div th:if="${equippedMap['DOPING'] != null}" style="text-align:center; width:100%;">
                    <img th:src="${equippedMap['DOPING'].item.imageUrl ?: '/images/no-image.png'}" class="slot-img">
                    <div class="equipped-name" th:text="${equippedMap['DOPING'].item.name}">Name</div>
                </div>
                <div th:if="${equippedMap['DOPING'] == null}" class="empty-text">EMPTY</div>
            </div>

            <div class="slot-card" onclick="openModal('ULT')">
                <span class="slot-label">ULTIMATE</span>
                <div th:if="${equippedMap['ULT'] != null}" style="text-align:center; width:100%;">
                    <img th:src="${equippedMap['ULT'].item.imageUrl ?: '/images/no-image.png'}" class="slot-img">
                    <div class="equipped-name" th:text="${equippedMap['ULT'].item.name}">Name</div>
                </div>
                <div th:if="${equippedMap['ULT'] == null}" class="empty-text">EMPTY</div>
            </div>

        </div>

        <div class="stats-area">
            <div>
                <h3 style="margin-top:0; color:#888;">OFFENSE</h3>
                <div class="stat-row">
                    <span class="stat-label">Fire Rate:</span>
                    <span class="stat-value" th:text="${loadout.fireRate} + ' /s'"></span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Bullets:</span>
                    <span class="stat-value" th:text="${loadout.bulletCount}"></span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Pattern:</span>
                    <span class="stat-value" th:text="${loadout.firePattern ?: 'SPREAD'}"></span>
                </div>
            </div>
            <div>
                <h3 style="margin-top:0; color:#888;">DEFENSE & MOBILITY</h3>
                <div class="stat-row">
                    <span class="stat-label">Bonus HP:</span>
                    <span class="stat-value" th:text="'+' + ${loadout.bonusHp}"></span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Dmg Cut:</span>
                    <span class="stat-value" th:text="${#numbers.formatPercent(loadout.damageReduction, 1, 0)}"></span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Speed:</span>
                    <span class="stat-value" th:text="${loadout.speedForward} + ' / ' + ${loadout.speedBackward}"></span>
                </div>
                <div class="stat-row" style="color: #ffd700;">
                    <span class="stat-label">Skill:</span>
                    <span class="stat-value" style="color:#ffd700" th:text="${loadout.ultType}"></span>
                </div>
            </div>
        </div>

        <div class="actions">
            <a href="/shop" class="btn btn-sec">ITEM SHOP</a>
            <a href="/my-page/geminigame" class="btn">LAUNCH MISSION</a>
        </div>
    </div>

    <div id="selectionModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modalTitle" style="margin:0;">SELECT MODULE</h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            
            <div id="modalListContainer">
                <div th:each="inv : ${allInventory}" 
                     class="select-item inventory-item" 
                     th:data-type="${inv.item.type}"
                     style="display:none;">
                    
                    <div class="item-content-wrapper">
                        <img th:src="${inv.item.imageUrl ?: '/images/no-image.png'}" class="list-img">
                        
                        <div class="select-item-info">
                            <h4 th:text="${inv.item.name}">Item Name</h4>
                            <p th:text="${inv.item.description}">Desc</p>
                        </div>
                    </div>

                    <div style="min-width: 80px; text-align: right;">
                        <div th:if="${inv.equipped}">
                            <form th:action="@{/shop/unequip/{id}(id=${inv.item.id})}" method="post" style="margin:0;">
                                <button type="submit" class="btn-unequip-modal">UNEQUIP</button>
                            </form>
                        </div>
                        <div th:if="${!inv.equipped}">
                            <form th:action="@{/shop/equip/{id}(id=${inv.item.id})}" method="post" style="margin:0;">
                                <button type="submit" class="btn-equip-modal">EQUIP</button>
                            </form>
                        </div>
                    </div>
                </div>

                <div id="noItemMessage" style="text-align:center; padding:20px; color:#666; display:none;">
                    NO ITEMS OWNED IN THIS CATEGORY.<br>
                    <a href="/shop" style="color:#00ffcc;">GO TO SHOP</a>
                </div>
            </div>
        </div>
    </div>
    
    <a href="/play" class="back-link">← RETURN TO flea</a>

    <script>
        function openModal(type) {
            const modal = document.getElementById('selectionModal');
            const title = document.getElementById('modalTitle');
            const items = document.querySelectorAll('.inventory-item');
            const noItemMsg = document.getElementById('noItemMessage');
            
            title.innerText = "SELECT " + type;
            let count = 0;
            items.forEach(el => {
                if (el.getAttribute('data-type') === type) {
                    el.style.display = 'flex'; // flexで表示
                    count++;
                } else {
                    el.style.display = 'none';
                }
            });

            if (count === 0) noItemMsg.style.display = 'block';
            else noItemMsg.style.display = 'none';

            modal.style.display = 'flex';
        }

        function closeModal(event) {
            if (!event || event.target.id === 'selectionModal' || !event.target.id) {
                document.getElementById('selectionModal').style.display = 'none';
            }
        }
    </script>
</body>
</html>
