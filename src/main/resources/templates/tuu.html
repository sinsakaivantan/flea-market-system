<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>aa</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style> 
        .sikibetu-btn {
            min-width: 110px;          
            padding: 12px 10px;        
            box-sizing: border-box;
            white-space: nowrap;       
            text-align: center;
        }
        
        /* ▼▼▼ 追加したスタイル ▼▼▼ */
        .wrap-text {
            white-space: pre-wrap;  /* 改行を維持して折り返す */
            word-break: break-word; /* 長い単語も折り返す */
            max-width: 300px;       /* 横幅の制限（必要に応じて調整してください） */
            vertical-align: top;    /* 上揃えにして見やすくする */
        }
        /* ▲▲▲ 追加したスタイル ▲▲▲ */
    </style>
</head>
<body>
    <header th:insert="~{fragments/layout :: header}"></header>
    <div class="container">
        <h1>aaaa</h1>
        <p>ようこそ、<span sec:authentication="name"></span>さん！ (管理者)</p>

        <div class="main-nav">
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="button secondary">ログアウト</button>
            </form>
        </div>

        <h2>最近の出品</h2>
        <table>
            <thead>
                <tr>
                    <th>対象者</th>
                    <th>通報者</th>
                    <th>テキスト</th>
                    <th>時間</th>
                    <th>行動</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="ad : ${tu}">
                    <td th:text="${ad.reportedUserId.name}"></td>
                    <td th:text="${ad.reporterUserId.name}"></td>
                    
                    <td th:text="${ad.reason}" class="wrap-text"></td>
                    
                    <td th:text="${ad.createdAt}"></td>
                    <td>
                        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
                        <form th:action="@{|/admin/${ad.id}/sikibe2|}" method="post" class="sikibetu-form">
                            <button type="submit" class="button sikibetu-btn" 
                                    th:attr="data-current=${ad.sikibetu}"  
                                    th:style="'background-color: ' + ${ad.sikibetu == 1 ? '#dc3545' : '#28a745'}">
                                <span th:text="${ad.sikibetu == 1 ? '確認済み' : '未確認'}"></span>
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <script>
        $(document).ready(function() {
            $('.sikibetu-form').on('submit', function(e) {
                e.preventDefault();
                
                var $form = $(this);
                var $btn = $form.find('.sikibetu-btn');
                
                $.ajax({
                    url: $form.attr('action'),
                    type: 'POST',
                    data: $form.serialize(),
                    success: function(response) {
                        if (response.success) {
                            var newValue = response.newSikibetu;
                            
                            if (newValue === 1) {
                                $btn.css('background-color', '#dc3545');
                                $btn.find('span').text('確認済み');
                            } else {
                                $btn.css('background-color', '#28a745');
                                $btn.find('span').text('未確認');
                            }
                            
                            $btn.attr('data-current', newValue);                            
                        } 
                    },
                });
            });
        });
    </script>
</body>
</html>
