<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head th:fragment="head(title)">
  <meta charset="UTF-8">
  <title th:text="${title}">ページ</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
  <header th:fragment="header">
    <nav class="global-header">
      <a class="header-logo" th:href="@{/items}">
        <img th:src="@{/images/logo.png}" alt="フリマアプリ" class="header-logo-image" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-block';">
        <span class="header-logo-text" style="display:none;">flea market</span>
      </a>      
      <div class="header-right" sec:authorize="isAuthenticated()">
        <a th:href="@{/admin/users}" 
           class="header-admin-button"
           th:if="${currentUser != null and currentUser.role == 'ADMIN'}">
          ユーザー管理
        </a>      
        <a th:href="@{/my-page}" class="header-user-info">
          <img th:src="${currentUser != null and currentUser.profileImageUrl != null ? currentUser.profileImageUrl : '/images/default-user.png'}" 
               alt="プロフィール画像" 
               class="header-profile-image">
          <span class="header-username" th:text="${currentUserNameDisplay}"></span>
        </a>
        <a th:href="@{/followlist}" class="header-follow-link">フォロー</a>       
        <a th:href="@{/items/new}" class="header-post-button">
          出品<span class="header-plus">+</span>
        </a>
      </div>
    </nav>
  </header>
</body>
</html>
