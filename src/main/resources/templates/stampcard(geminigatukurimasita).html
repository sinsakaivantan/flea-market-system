<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login Bonus - Celestial Mandates</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="back-nav">
    <a th:href="@{/play}" class="back-link">RETURN</a>
</div>
<div class="container-wrapper">
    <section class="stamp-section">
        <h2 class="stamp-title">Login Bonus Chart</h2>
        
        <div class="calendar-wrapper">
            <div class="calendar-header">
                <button id="prevMonth" class="nav-btn">◀</button>
                <span id="currentMonthLabel">Loading...</span>
                <button id="nextMonth" class="nav-btn">▶</button>
            </div>
            <div class="calendar-grid" id="calendarGrid">
                </div>
        </div>
        
        <p id="errorMessage" style="color: #ff6b6b; font-size: 0.8rem; margin-top: 10px; display: none;"></p>
    </section>
</div>

<style>
    :root {
        --bg-deep: #1a0b2e;
        --gold: #d4af37;
        --gold-glow: #f9e79f;
        --text-main: #e0d8ff;
        --border: rgba(212, 175, 55, 0.3);
        --primary: #d4af37;
        --text-muted: rgba(224, 216, 255, 0.6);
    }

    body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at center, #2e1a47 0%, #0d0417 100%);
        color: var(--text-main);
        font-family: 'Cormorant Garamond', serif;
        overflow-x: hidden;
    }

    /* --- 戻るボタンのスタイル --- */
    .back-nav {
        position: fixed; /* 画面左上に固定 */
        top: 25px;
        left: 25px;
        z-index: 50;
    }

    .back-link {
        display: flex;
        align-items: center;
        gap: 8px;
        color: rgba(212, 175, 55, 0.5);
        text-decoration: none;
        font-family: 'Cinzel', serif;
        font-size: 1.1rem;
        letter-spacing: 0.1em;
        transition: all 0.3s ease;
        text-shadow: 0 0 5px rgba(0,0,0,0.8);
    }

    .back-link::before {
        content: '«';
        font-size: 1.5rem;
        padding-bottom: 2px;
        transition: transform 0.3s ease;
    }

    .back-link:hover {
        color: var(--gold);
        text-shadow: 0 0 15px var(--gold);
        transform: scale(1.05);
    }

    .back-link:hover::before {
        transform: translateX(-5px);
    }

    /* --- メインレイアウト調整 --- */
    .container-wrapper {
        min-height: 100vh; /* 画面いっぱいの高さ */
        display: flex;
        justify-content: center; /* 水平中央 */
        align-items: center;     /* 垂直中央 */
        padding: 20px;
        box-sizing: border-box;
    }

    /* --- スタンプセクション --- */
    .stamp-section {
        width: 100%;
        max-width: 500px;
        background: rgba(20, 10, 40, 0.7);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 40px 30px; /* パディングを少し調整 */
        text-align: center;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
        backdrop-filter: blur(8px);
        /* 登場アニメーション */
        animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    
    .stamp-title {
        color: var(--primary);
        font-family: 'Cinzel', serif;
        margin: 0 0 30px 0;
        text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        font-size: 2rem;
        letter-spacing: 0.1em;
        border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        padding-bottom: 15px;
    }

    .calendar-wrapper {
        margin: 0 auto;
    }

    .calendar-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        color: var(--text-main);
        font-family: 'Cinzel', serif;
        font-size: 1.3rem;
        letter-spacing: 0.05em;
    }

    .nav-btn {
        background: transparent;
        border: 1px solid var(--primary);
        color: var(--primary);
        border-radius: 50%;
        width: 36px; height: 36px;
        cursor: pointer;
        transition: 0.3s;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 0.8rem;
    }
    .nav-btn:hover {
        background: var(--primary);
        color: #0d0417;
        box-shadow: 0 0 15px var(--primary);
    }

    .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 8px;
    }

    .calendar-day {
        aspect-ratio: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(212, 175, 55, 0.1);
        border-radius: 4px;
        color: var(--text-muted);
        font-family: 'Cormorant Garamond', serif;
        position: relative;
        font-size: 1rem;
        transition: 0.3s;
    }

    /* スタンプが押された日 */
    .calendar-day.stamped {
        background: rgba(212, 175, 55, 0.15);
        border-color: var(--primary);
        color: var(--gold-glow);
        box-shadow: inset 0 0 10px rgba(212, 175, 55, 0.1);
    }

    /* スタンプエフェクト（疑似要素で紋章を表示） */
    .calendar-day.stamped::after {
        content: '✦'; /* 太陽の代わりに星形に変更（雰囲気合わせ） */
        position: absolute;
        font-size: 1.4rem;
        color: var(--primary);
        text-shadow: 0 0 8px var(--gold-glow);
        animation: stampIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* 今日 */
    .calendar-day.today {
        border: 1px dashed var(--primary);
        background: rgba(255, 255, 255, 0.08);
    }

    @keyframes stampIn {
        0% { transform: scale(3) rotate(-45deg); opacity: 0; }
        100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    /* スマホ対応 */
    @media (max-width: 600px) {
        .stamp-section { padding: 20px; }
        .calendar-day { font-size: 0.9rem; }
        .back-nav { top: 15px; left: 15px; }
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const calendarGrid = document.getElementById('calendarGrid');
        const currentMonthLabel = document.getElementById('currentMonthLabel');
        const prevBtn = document.getElementById('prevMonth');
        const nextBtn = document.getElementById('nextMonth');
        const errorMessage = document.getElementById('errorMessage');

        let currentDate = new Date(); // 表示基準日
        let stampedDates = []; // APIから取得したスタンプ日付リスト

        // 1. スタンプデータを取得
        fetch('/api/stamps')
            .then(res => {
                if (!res.ok) throw new Error(`API Error: ${res.status}`);
                return res.json();
            })
            .then(data => {
                stampedDates = data; 
                renderCalendar(currentDate);
            })
            .catch(err => {
                console.error('Failed to fetch stamps:', err);
                errorMessage.textContent = "Unable to commune with the archives.";
                errorMessage.style.display = 'block';
                renderCalendar(currentDate);
            });

        // 2. カレンダー描画関数
        function renderCalendar(date) {
            calendarGrid.innerHTML = '';
            
            const year = date.getFullYear();
            const month = date.getMonth(); // 0-11
            
            // ヘッダー表示
            const monthNames = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE",
                                "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"];
            currentMonthLabel.textContent = `${monthNames[month]} ${year}`;

            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            
            const startDayOfWeek = firstDay.getDay(); // 0(Sun) - 6(Sat)
            const totalDays = lastDay.getDate();

            // 曜日のヘッダーを追加
            const weekDays = ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'];
            weekDays.forEach(day => {
                const div = document.createElement('div');
                div.className = 'calendar-day';
                div.style.background = 'transparent';
                div.style.border = 'none';
                div.style.color = '#d4af37'; // Gold
                div.style.fontWeight = 'bold';
                div.style.fontFamily = "'Cinzel', serif"; // ヘッダーはCinzelで統一
                div.textContent = day;
                calendarGrid.appendChild(div);
            });

            // 空白セル
            for (let i = 0; i < startDayOfWeek; i++) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'calendar-day';
                emptyDiv.style.opacity = '0';
                emptyDiv.style.pointerEvents = 'none';
                calendarGrid.appendChild(emptyDiv);
            }

            // 日付セル
            const todayObj = new Date();
            const tYear = todayObj.getFullYear();
            const tMonth = String(todayObj.getMonth() + 1).padStart(2, '0');
            const tDay = String(todayObj.getDate()).padStart(2, '0');
            const todayStr = `${tYear}-${tMonth}-${tDay}`;

            for (let d = 1; d <= totalDays; d++) {
                const cell = document.createElement('div');
                cell.className = 'calendar-day';
                cell.textContent = d;

                const checkDate = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;

                if (checkDate === todayStr) {
                    cell.classList.add('today');
                }

                if (stampedDates.includes(checkDate)) {
                    cell.classList.add('stamped');
                }

                calendarGrid.appendChild(cell);
            }
        }

        prevBtn.addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar(currentDate);
        });
        nextBtn.addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar(currentDate);
        });
    });
</script>
</body>
</html>
