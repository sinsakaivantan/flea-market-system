# データベース接続設定（環境変数から取得可能）
# 環境変数: DB_URL, DB_USERNAME, DB_PASSWORD
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

# データベース接続プール設定（接続エラー対策）
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ファイルアップロードサイズ制限設定
# 1つのファイルの最大サイズ（10MB）
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
# リクエスト全体の最大サイズ（100MB）
spring.servlet.multipart.max-request-size=100MB
spring.mvc.async.request-timeout=600000
server.tomcat.max-swallow-size=-1
server.tomcat.max-http-form-post-size=-1
server.tomcat.max-http-response-header-size=2MB
server.tomcat.max-parameter-count=-1
server.max-http-request-header-size=1MB
server.tomcat.max-part-header-size=-1
server.tomcat.max-part-count=-1
# ログレベル設定（環境変数から取得可能）
# 環境変数: LOGGING_LEVEL (DEBUG, INFO, WARN, ERROR)
# デフォルト値はINFO（起動エラーの詳細を確認する場合はDEBUGに変更）
logging.level.root=${LOGGING_LEVEL}
logging.level.org.springframework.security=${LOGGING_LEVEL}
logging.level.org.springframework.security.web.authentication=WARN
logging.level.com.example.fleamarketsystem=${LOGGING_LEVEL}
logging.level.com.example.fleamarketsystem.security=${LOGGING_LEVEL}

spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:/schema.sql
spring.sql.init.data-locations=classpath:/data.sql
spring.jpa.defer-datasource-initialization=false

# --- Cloudinary ---
# 環境変数: CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# --- Stripe ---
# 環境変数: STRIPE_SECRET_KEY, STRIPE_PUBLIC_KEY
stripe.api.secretKey=${STRIPE_SECRET_KEY}
stripe.public.key=${STRIPE_PUBLIC_KEY}

# --- Gmail SMTP ---
# 環境変数: GMAIL_SMTP_USERNAME, GMAIL_SMTP_PASSWORD
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_SMTP_USERNAME:}
spring.mail.password=${GMAIL_SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# サーバーポート設定（環境変数から取得可能）
# 環境変数: SERVER_PORT
server.port=${SERVER_PORT}


# Springプロファイル設定（環境変数から取得可能）
# 環境変数: SPRING_PROFILES_ACTIVE
#spring.profiles.active=${SPRING_PROFILES_ACTIVE:}